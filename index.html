<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tayyab ❤️ Noor</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url("Screenshot_20260627-020345.png") no-repeat center center fixed;
background-size: cover;
overflow:hidden;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:35px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
font-size:40px;
margin:20px 0;
}

h2{
font-size:30px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:30px;
}

.buttons{
position:relative;
height:80px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

#yes{
background:#4CAF50;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
position:absolute;
right:0;
background:#ff4d6d;
color:white;
}

.hearts{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="card">

<h3>From: Tayyab Malik ❤️</h3>

<h1>Will You Forever Be Mine?</h1>

<h2>Noor 💖</h2>

<p>
You are the most beautiful part of my life.<br>
Every smile of yours means the world to me.<br><br>

Will you stay with me forever? ❤️
</p>

<div class="buttons">

<button id="yes">Yes ❤️</button>

<button id="no">No 😢</button>

</div>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",moveButton);
no.addEventListener("click",moveButton);

function moveButton(){

let x=Math.random()*(window.innerWidth-150);
let y=Math.random()*(window.innerHeight-80);

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

}

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`<audio id="bgMusic" autoplay loop>
    <source src="music.mp3.mp3" type="audio/mpeg">
</audio>

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Screenshot_20260627-020345.png') center center/cover no-repeat;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
">

<div>

<h1 style="font-size:55px;">YAY!! ❤️🎉</h1>

<h2>Noor said YES!</h2>

<p style="font-size:28px;margin-top:20px;color:#4bfa48;">
Tayyab Malik is now the happiest person alive. 💍❤️
<br><br>
I promise to love you forever,
respect you,
and stand beside you forever👫.
</p>

<h1 style="margin-top:30px;">
I Love You mri jaawn🫶🏻❤️
</h1>

</div>

</div>

`;
document.getElementById("bgMusic").play();
}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(3+Math.random()*4)+"s";

document.querySelector(".hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,300);

</script>
<audio id="bgMusic" autoplay loop>
    <source src="music.mp3.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });
</script>
</body>
</html>
